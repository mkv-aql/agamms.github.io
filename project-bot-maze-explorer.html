  <main class="container">
    <section>
      <h2 data-en="Overview" data-de="Uberblick"></h2>
      <p data-en="This project was developed in January 2020 at Deggendorf Institute of Technology as part of a university mechatronics project. The objective was to create a maze explorer robot that can navigate and map an unknown environment using only distance sensors and no camera, similar to a robot exploring a dark cave."
         data-de="Dieses Projekt wurde im Januar 2020 an der Technischen Hochschule Deggendorf im Rahmen eines universitaren Mechatronikprojekts entwickelt. Das Ziel war ein Labyrinth-Explorer-Roboter, der eine unbekannte Umgebung nur mit Distanzsensoren und ohne Kamera navigiert und kartiert, ahnlich wie ein Roboter zur Erkundung einer dunklen Hohle."></p>
      <p data-en="The platform uses an Arduino-based Zumo bot with a Raspberry Pi, powered by a power bank, and three ultrasonic sensors facing front, left, and right. To validate the approach, the bot was tested in two custom cardboard mazes with S-shaped and U-shaped layouts."
         data-de="Die Plattform verwendet einen Arduino-basierten Zumo-Bot mit einem Raspberry Pi, versorgt uber eine Powerbank, sowie drei Ultraschallsensoren nach vorne, links und rechts. Zur Validierung wurde der Bot in zwei selbstgebauten Karton-Labyrinthen mit S- und U-Form getestet."></p>
    </section>

    <section>
      <h2 data-en="Hardware Setup" data-de="Hardware-Aufbau"></h2>
      <ul>
        <li data-en="<strong>Arduino-based Zumo bot</strong> for motor control and low-level sensing"
            data-de="<strong>Arduino-basierter Zumo-Bot</strong> fur Motorsteuerung und Low-Level-Sensorik"></li>
        <li data-en="<strong>Raspberry Pi</strong> for serial data processing and map generation logic"
            data-de="<strong>Raspberry Pi</strong> fur serielle Datenverarbeitung und Logik zur Kartenerstellung"></li>
        <li data-en="<strong>Three ultrasonic sensors</strong> (front, left, right) for wall and corridor detection"
            data-de="<strong>Drei Ultraschallsensoren</strong> (vorne, links, rechts) zur Wand- und Korridorerkennung"></li>
        <li data-en="<strong>3D-printed mounting parts</strong> to integrate electronics on the Zumo platform"
            data-de="<strong>3D-gedruckte Halterungen</strong> zur Integration der Elektronik auf der Zumo-Plattform"></li>
        <li data-en="<strong>Power bank</strong> for mobile power supply"
            data-de="<strong>Powerbank</strong> als mobile Stromversorgung"></li>
      </ul>
    </section>

    <section>
      <h2 data-en="How It Works" data-de="Funktionsweise"></h2>
      <p data-en="The Arduino continuously reads the ultrasonic sensors and controls movement. Sensor data is streamed via serial connection to the Raspberry Pi. When left and right distances remain stable and front distance is clear, the robot is interpreted as moving straight."
         data-de="Der Arduino liest kontinuierlich die Ultraschallsensoren und steuert die Bewegung. Sensordaten werden uber eine serielle Verbindung an den Raspberry Pi gestreamt. Wenn linke und rechte Distanz stabil bleiben und vorne frei ist, wird dies als Geradeausfahrt interpretiert."></p>
      <p data-en="When the robot reaches a front wall, it compares left and right distances, turns toward the side with greater free space, and reports the turn event. The Raspberry Pi uses these events to reconstruct corridors and turns, producing a visual map of the explored maze."
         data-de="Wenn der Roboter auf eine Frontwand trifft, vergleicht er linke und rechte Distanz, dreht zur Seite mit mehr freiem Raum und meldet das Abbiegeereignis. Der Raspberry Pi nutzt diese Ereignisse, um Korridore und Kurven zu rekonstruieren und eine visuelle Karte des erkundeten Labyrinths zu erzeugen."></p>
    </section>

    <section>
      <h2 data-en="Control App and Data Processing" data-de="Steuerungs-App und Datenverarbeitung"></h2>
      <p data-en="A Python desktop app (Tkinter + Turtle graphics) was used to monitor and control the system live. The GUI could send commands such as start, stop, move, rotate angle, and speed to the Arduino while showing live sensor values and motor rotation feedback."
         data-de="Eine Python-Desktop-App (Tkinter + Turtle-Grafik) wurde verwendet, um das System live zu uberwachen und zu steuern. Die GUI konnte Befehle wie Start, Stopp, Fahren, Drehwinkel und Geschwindigkeit an den Arduino senden und gleichzeitig Live-Sensorwerte sowie Motorrotationsdaten anzeigen."></p>
      <p data-en="Based on collected sensor streams and movement data, the app generated the final maze map as the exploration result."
         data-de="Basierend auf den erfassten Sensorstreams und Bewegungsdaten erzeugte die App die finale Labyrinthkarte als Erkundungsergebnis."></p>
    </section>
